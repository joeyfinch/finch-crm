<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Finch — Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='assets/images/apple-touch-icon.png') }}">
</head>
<body>
    <div class="lock-screen-wrapper">
        <div class="lock-card card animate-fade-in">
            <header class="brand-header">
                <img src="{{ url_for('static', filename='assets/images/logo.png') }}" alt="JOE FINCH" class="brand-logo" onerror="this.style.display='none'; document.getElementById('brand-logo-text').style.display='block';">
                <h1 id="brand-logo-text" style="display: none; font-family: var(--font-heading); font-size: 2rem; letter-spacing: 0.2em;">JOE FINCH</h1>
                <div class="brand-subtitle" style="font-size: 0.65rem;">Administration</div>
            </header>

            <div class="lock-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2>Passcode Required</h2>
            <p>Please enter the administrative key to access the collector database.</p>

            <form id="admin-login-form" novalidate>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="text-align: center; font-size: 1.2rem; letter-spacing: 0.35em;" autofocus>
                    <div id="error-message" class="text-error" style="display: none;">Invalid administrative passcode.</div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Unlock</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('admin-login-form');
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('error-message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';

                const password = passwordInput.value;
                if (!password) return;

                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Unlocking...';

                try {
                    const response = await fetch('/admin/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password })
                    });

                    if (response.ok) {
                        window.location.reload();
                    } else {
                        errorMsg.style.display = 'block';
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    errorMsg.textContent = 'Connection failed. Please try again.';
                    errorMsg.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Unlock';
                }
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/floating_background.js') }}"></script>
</body>
</html>
